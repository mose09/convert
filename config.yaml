oracle:
  dsn: "localhost:1521/ORCL"
  user: "${ORACLE_USER}"
  instant_client_dir: null  # Oracle Instant Client 경로 (예: "C:/oracle/instantclient_19_25")

tables:
  - name: "CUSTOMERS"
    # columns: ["NAME", "EMAIL", "ADDRESS"]  # omit to use all columns

embedding:
  api_base: "https://api.openai.com/v1"
  model: "text-embedding-3-small"
  batch_size: 100
  dimensions: 1536

storage:
  file_format: "parquet"  # parquet | jsonl | txt | markdown (txt/markdown: Msty KB용, 임베딩 생략)
  output_dir: "./output"
  write_to_oracle: false
  oracle_target_table: "EMBEDDINGS_STORE"

processing:
  row_limit: null
  text_template: "{column_name}: {value}"
  row_separator: " | "

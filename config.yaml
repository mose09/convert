oracle:
  dsn: "${ORACLE_DSN}"
  user: "${ORACLE_USER}"
  schema_owner: "${ORACLE_SCHEMA_OWNER}"
  instant_client_dir: "${ORACLE_INSTANT_CLIENT_DIR}"

# 특정 테이블만 추출 (생략 시 해당 owner의 전체 테이블)
# tables:
#   - "CUSTOMERS"
#   - "ORDERS"
#   - "PRODUCTS"

storage:
  file_format: "markdown"  # markdown | txt
  output_dir: "./output"

vectordb:
  db_path: "./vectordb"
  columns_per_chunk: 30

embedding:
  api_base: "${EMBEDDING_API_BASE}"
  api_key: "${EMBEDDING_API_KEY}"
  model: "${EMBEDDING_MODEL}"

llm:
  api_base: "${LLM_API_BASE}"
  api_key: "${LLM_API_KEY}"
  model: "${LLM_MODEL}"

# AS-IS 레거시 소스 분석 (analyze-legacy 명령어)
legacy:
  menu:
    table: "TB_MENU"
    columns:
      program_id: "PROGRAM_ID"
      program_nm: "PROGRAM_NM"
      url: "URL"
      parent_id: "PARENT_ID"
      level: "LEVEL"
  rfc_depth: 2

oracle:
  dsn: "localhost:1521/ORCL"
  user: "${ORACLE_USER}"
  schema_owner: "${ORACLE_USER}"  # 스키마 소유자 (다를 경우 별도 지정)
  instant_client_dir: null        # Oracle Instant Client 경로 (예: "C:/oracle/instantclient_19_25")

# 특정 테이블만 추출 (생략 시 해당 owner의 전체 테이블)
# tables:
#   - "CUSTOMERS"
#   - "ORDERS"
#   - "PRODUCTS"

storage:
  file_format: "markdown"  # markdown | txt
  output_dir: "./output"

# 벡터 DB 설정 (embed / erd-rag 커맨드)
vectordb:
  db_path: "./vectordb"

# 임베딩 모델 설정 (폐쇄망 로컬 모델)
embedding:
  api_base: "http://localhost:11434/v1"  # Ollama 기본 주소
  api_key: "ollama"
  model: "nomic-embed-text"              # 임베딩 모델 (bge-m3, mxbai-embed-large 등)

# LLM 설정 (erd --llm-assist, erd-rag 커맨드)
# Ollama, vLLM, LocalAI 등 OpenAI 호환 API
llm:
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  model: "llama3"                        # 생성 모델 (qwen2.5, mistral 등)

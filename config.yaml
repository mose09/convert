oracle:
  dsn: "localhost:1521/ORCL"
  user: "${ORACLE_USER}"
  schema_owner: "${ORACLE_USER}"  # 스키마 소유자 (다를 경우 별도 지정)
  instant_client_dir: null        # Oracle Instant Client 경로 (예: "C:/oracle/instantclient_19_25")

# 특정 테이블만 추출 (생략 시 해당 owner의 전체 테이블)
# tables:
#   - "CUSTOMERS"
#   - "ORDERS"
#   - "PRODUCTS"

storage:
  file_format: "markdown"  # markdown | txt
  output_dir: "./output"

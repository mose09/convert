# ==========================================================================
# column_mapping.yaml — SQL Migration template
# ==========================================================================
#
# AS-IS (Oracle 11g) → TO-BE (Oracle 23ai) 스키마 매핑 정의.
# 스펙: docs/migration/spec.md §4.
#
# 사용법:
#   1) 이 파일을 복사 → input/column_mapping.yaml
#   2) 프로젝트의 실제 테이블/컬럼으로 수정
#   3) python main.py migration-impact --mapping input/column_mapping.yaml ...
#
# Placeholder 문법 (transform / reverse / transform_select):
#   {src}       : AS-IS 컬럼 자체
#   {컬럼명}    : 같은 엔트리의 다른 AS-IS 컬럼 (merge 케이스)
# Oracle SQL 함수 호출 가능. 표현식은 load 시 sqlglot 로 파싱 검증됨.
# ==========================================================================

version: "1.0"

default_schema:
  as_is: "LEGACY"
  to_be: "NEW"

options:
  emit_column_comments: true
  comment_scope: [select, update, insert]     # where/join 은 기본 제외 (가독성)
  comment_source: terms_dictionary            # to_be_schema | terms_dictionary | both
  comment_format: "/* {ko_name} */"
  unknown_table_action: warn                  # warn | error | drop

# --------------------------------------------------------------------------
# tables — 테이블 레벨 변경 (rename / split / merge / drop)
# --------------------------------------------------------------------------
tables:
  # 1:1 rename
  - as_is: CUST
    to_be: CUSTOMER_MASTER
    type: rename

  # 분할 (discriminator 컬럼 기반)
  - as_is: ORDER_HIST
    to_be: [ORDER_HEADER, ORDER_ITEM]
    type: split
    discriminator_column: HIST_TYPE
    discriminator_map:
      "H": ORDER_HEADER
      "I": ORDER_ITEM

  # 병합
  - as_is: [USER_BASIC, USER_DETAIL]
    to_be: USER
    type: merge
    join_condition: "USER_BASIC.USER_ID = USER_DETAIL.USER_ID"

  # 삭제
  - as_is: OBSOLETE_TBL
    to_be: null
    type: drop

  # 컬럼 분할 예제를 위한 참조 (FULL_NAME 이 여기 속함)
  # rename 정의와 같이 써도 무방 (CUST 는 이미 위에 있음)

  # 컬럼 병합 예제용
  - as_is: EVT
    to_be: EVENT
    type: rename


# --------------------------------------------------------------------------
# columns — 컬럼 레벨 변경
# --------------------------------------------------------------------------
columns:

  # --- 1:1 단순 rename ---
  - as_is: { table: CUST, column: CUST_NM }
    to_be: { table: CUSTOMER_MASTER, column: CUSTOMER_NAME }

  # --- 타입 변환 + 함수 래핑 (VARCHAR2(8) → DATE) ---
  - as_is: { table: CUST, column: REG_DT, type: "VARCHAR2(8)" }
    to_be: { table: CUSTOMER_MASTER, column: REGISTER_DATE, type: "DATE" }
    transform:
      read:  "TO_DATE({src}, 'YYYYMMDD')"
      write: "TO_CHAR({src}, 'YYYYMMDD')"
      where: "TO_DATE({src}, 'YYYYMMDD')"

  # --- 컬럼 분할 (1:N) ---
  - as_is: { table: CUST, column: FULL_NAME }
    to_be:
      - table: CUSTOMER_MASTER
        column: FIRST_NAME
        transform_select: "SUBSTR({src}, 1, INSTR({src}, ' ') - 1)"
      - table: CUSTOMER_MASTER
        column: LAST_NAME
        transform_select: "SUBSTR({src}, INSTR({src}, ' ') + 1)"
    reverse: "{FIRST_NAME} || ' ' || {LAST_NAME}"

  # --- 컬럼 병합 (N:1, YYYY+MM+DD → EVENT_DATE) ---
  - as_is:
      - { table: EVT, column: YYYY }
      - { table: EVT, column: MM }
      - { table: EVT, column: DD }
    to_be: { table: EVENT, column: EVENT_DATE, type: "DATE" }
    transform:
      combine: "TO_DATE({YYYY} || {MM} || {DD}, 'YYYYMMDD')"

  # --- 값 재매핑 (Y/N → 1/0) ---
  - as_is: { table: CUST, column: USE_YN }
    to_be: { table: CUSTOMER_MASTER, column: IS_ACTIVE, type: "NUMBER(1)" }
    value_map: { "Y": 1, "N": 0 }
    default_value: 0

  # --- 삭제된 컬럼 (참조 발견 시 warning) ---
  - as_is: { table: CUST, column: OBSOLETE_FLAG }
    to_be: null
    action: drop_with_warning
